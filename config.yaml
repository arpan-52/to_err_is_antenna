# to_err_is_antenna Configuration File
# =====================================
# Example configuration showing the rule-based API

# Required: Path to input Measurement Set
input_ms: /home/arpan/to_err_is_antenna/vla_3C286_Lband/vla_3C286_Lband.vla.d.ms

# Required: Corruption rules
# Each rule combines a selection with the exact phase/amplitude errors.
rules:
  # Apply a +10 degree phase offset to the C04-C05 baseline
  - antennas: W01&W02
    phase_error_deg: 20

  # Increase amplitude by 5% on all baselines involving C06
  - antennas: W01&E08
    amp_error_pct: 20


# ─────────────────────────────────────────────────────────────
# COLUMN PARAMETERS
# ─────────────────────────────────────────────────────────────
input_column: DATA
output_column: CORRECTED_DATA

# ─────────────────────────────────────────────────────────────
# PROCESSING OPTIONS
# ─────────────────────────────────────────────────────────────
chunk_size_mb: 512

